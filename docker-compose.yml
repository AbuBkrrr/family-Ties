version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: family-ties-db
    environment:
      POSTGRES_USER: familyties
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: familyties
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - family-ties-network

  redis:
    image: redis:7-alpine
    container_name: family-ties-redis
    ports:
      - "6379:6379"
    networks:
      - family-ties-network

  backend:
    build: ./backend
    container_name: family-ties-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: familyties
      DB_USER: familyties
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - family-ties-network
    volumes:
      - ./backend/uploads:/app/uploads

  ai-microservice:
    build: ./ai-service
    container_name: family-ties-ai
    environment:
      PYTHONUNBUFFERED: 1
      TESSERACT_DATA_DIR: /usr/share/tesseract-ocr/4.00/tessdata
    ports:
      - "5000:5000"
    depends_on:
      - backend
    networks:
      - family-ties-network
    volumes:
      - ./ai-service/models:/app/models

  frontend:
    build: ./frontend
    container_name: family-ties-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000/api
      REACT_APP_WS_URL: ws://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - family-ties-network

networks:
  family-ties-network:
    driver: bridge

volumes:
  postgres_data:
